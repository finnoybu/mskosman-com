<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Color Pill Contrast Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --text-dark: #0f172a;
    --text-light: #ffffff;

    --bg-light: #ffffff;
    --bg-dark: #0b0f19;

    /* Locked 16 Colors */
    --pill-01: #970c0c;
    --pill-02: #97410c;
    --pill-03: #eebd2b;
    --pill-04: #d4ee2b;
    --pill-05: #8cee2b;
    --pill-06: #41ee2b;
    --pill-07: #2bee5b;
    --pill-08: #2beea6;
    --pill-09: #2beeee;
    --pill-10: #0c6297;
    --pill-11: #0c2f97;
    --pill-12: #1f0c97;
    --pill-13: #520c97;
    --pill-14: #870c97;
    --pill-15: #970c74;
    --pill-16: #970c3f;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
  }

  section {
    padding: 3rem 2rem;
  }

  h2 {
    margin-bottom: 1.5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  .pill-wrapper {
    text-align: center;
  }

  .pill {
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.85rem;
    display: inline-block;
  }

  .outline {
    background: transparent;
    border: 2px solid;
  }

  .ratio {
    font-size: 0.75rem;
    margin-top: 0.4rem;
  }

  .fail {
    color: #ff4d4d;
    font-weight: 600;
  }

  .pass {
    color: #16a34a;
    font-weight: 600;
  }

  .dark-bg {
    background: var(--bg-dark);
    color: var(--text-light);
  }

  .light-bg {
    background: var(--bg-light);
    color: var(--text-dark);
  }
</style>
</head>
<body>

<!-- DARK BACKGROUND -->

<section class="dark-bg">
  <h2>Dark BG — Solid Pills (Black Text)</h2>
  <div class="grid" id="dark-solid-black"></div>
</section>

<section class="dark-bg">
  <h2>Dark BG — Solid Pills (White Text)</h2>
  <div class="grid" id="dark-solid-white"></div>
</section>

<section class="dark-bg">
  <h2>Dark BG — Outline Pills (White Text)</h2>
  <div class="grid" id="dark-outline-white"></div>
</section>

<!-- LIGHT BACKGROUND -->

<section class="light-bg">
  <h2>Light BG — Solid Pills (Black Text)</h2>
  <div class="grid" id="light-solid-black"></div>
</section>

<section class="light-bg">
  <h2>Light BG — Solid Pills (White Text)</h2>
  <div class="grid" id="light-solid-white"></div>
</section>

<section class="light-bg">
  <h2>Light BG — Outline Pills (Black Text)</h2>
  <div class="grid" id="light-outline-black"></div>
</section>

<script>
  const colors = Array.from({ length: 16 }, (_, i) =>
    getComputedStyle(document.documentElement)
      .getPropertyValue(`--pill-${String(i + 1).padStart(2, '0')}`)
      .trim()
  );

  function hexToRgb(hex) {
    const bigint = parseInt(hex.slice(1), 16);
    return {
      r: (bigint >> 16) & 255,
      g: (bigint >> 8) & 255,
      b: bigint & 255
    };
  }

  function luminance(r, g, b) {
    const a = [r, g, b].map(v => {
      v /= 255;
      return v <= 0.03928
        ? v / 12.92
        : Math.pow((v + 0.055) / 1.055, 2.4);
    });
    return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
  }

  function contrast(hex1, hex2) {
    const rgb1 = hexToRgb(hex1);
    const rgb2 = hexToRgb(hex2);

    const lum1 = luminance(rgb1.r, rgb1.g, rgb1.b);
    const lum2 = luminance(rgb2.r, rgb2.g, rgb2.b);

    const brightest = Math.max(lum1, lum2);
    const darkest = Math.min(lum1, lum2);

    return (brightest + 0.05) / (darkest + 0.05);
  }

  function createPill(containerId, bg, textColor, outline = false) {
    const wrapper = document.createElement('div');
    wrapper.className = 'pill-wrapper';

    const pill = document.createElement('div');
    pill.className = 'pill';
    if (outline) {
      pill.classList.add('outline');
      pill.style.borderColor = bg;
      pill.style.color = textColor;
    } else {
      pill.style.background = bg;
      pill.style.color = textColor;
    }

    pill.textContent = bg;

    const ratio = contrast(bg, textColor);
    const ratioEl = document.createElement('div');
    ratioEl.className = 'ratio';
    ratioEl.textContent = `Contrast: ${ratio.toFixed(2)}:1`;
    ratioEl.classList.add(ratio >= 5 ? 'pass' : 'fail');

    wrapper.appendChild(pill);
    wrapper.appendChild(ratioEl);

    document.getElementById(containerId).appendChild(wrapper);
  }

  colors.forEach(color => {
    createPill('dark-solid-black', color, '#000000');
    createPill('dark-solid-white', color, '#ffffff');
    createPill('dark-outline-white', color, '#ffffff', true);

    createPill('light-solid-black', color, '#000000');
    createPill('light-solid-white', color, '#ffffff');
    createPill('light-outline-black', color, '#000000', true);
  });
</script>

</body>
</html>
